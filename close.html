<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Close Delivery Challan</title>

<style>

body{
  margin:0;
  font-family: "Segoe UI", Arial, sans-serif;
  background:#f3f5f7;
}

.wrapper{
  max-width:800px;
  margin:60px auto;
  padding:0 20px;
}

.header{
  font-size:26px;
  font-weight:600;
  margin-bottom:8px;
}

.sub{
  color:#6b7280;
  margin-bottom:30px;
}

.card{
  background:white;
  padding:28px;
  border-radius:8px;
  box-shadow:0 8px 22px rgba(0,0,0,.08);
}

label{
  font-size:13px;
  font-weight:600;
  color:#444;
  display:block;
  margin-bottom:6px;
}
  

select,input{
  width:100%;
  padding:12px;
  border:1px solid #cfd6dd;
  border-radius:6px;
  font-size:15px;
  background:#fafbfc;
}

select:focus,input:focus{
  outline:none;
  border-color:#2563eb;
  background:white;
}

.summary{
  margin-top:20px;
  padding:16px;
  background:#f8fafc;
  border-radius:6px;
  display:none;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}
