<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Close Delivery Challan</title>

<style>

body{
  margin:0;
  font-family: "Segoe UI", Arial, sans-serif;
  background:#f3f5f7;
}

.wrapper{
  max-width:800px;
  margin:60px auto;
  padding:0 20px;
}

.header{
  font-size:26px;
  font-weight:600;
  margin-bottom:8px;
}

.sub{
  color:#6b7280;
  margin-bottom:30px;
}

.card{
  background:white;
  padding:28px;
  border-radius:8px;
  box-shadow:0 8px 22px rgba(0,0,0,.08);
}

label{
  font-size:13px;
  font-weight:600;
  color:#444;
  display:block;
  margin-bottom:6px;
}
  

select,input{
  width:100%;
  padding:12px;
  border:1px solid #cfd6dd;
  border-radius:6px;
  font-size:15px;
  background:#fafbfc;
}

select:focus,input:focus{
  outline:none;
  border-color:#2563eb;
  background:white;
}

.summary{
  margin-top:20px;
  padding:16px;
  background:#f8fafc;
  border-radius:6px;
  display:none;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}  


.row span:first-child{
  color:#6b7280;
}

 button{
  margin-top:24px;
  width:100%;
  padding:14px;
  background:#0f172a;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}
  
button:hover{
  background:#020617;
}

button:disabled{
  background:#9ca3af;
}

.msg{
  margin-top:16px;
  font-weight:600;
}

.success{ color:#15803d; }
.error{ color:#dc2626; }
.info{ color:#475569; }

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  background:#e2e8f0;
  font-size:12px;
  margin-left:8px;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">Close Delivery Challan</div>
<div class="sub">Select pending DC and enter invoice reference</div>

<div class="card">

<label>Pending DC</label>
<select id="dcSelect"></select>

<div class="summary" id="summary">
<div class="row"><span>Customer</span><span id="customer"></span></div>
<div class="row"><span>Part</span><span id="part"></span></div>
<div class="row"><span>Quantity</span><span id="qty"></span></div>
<div class="row"><span>Remark</span><span id="remark"></span></div>
</div>
<label style="margin-top:18px;">Invoice Number</label>
<input id="invoice">
  
<button id="closeBtn" onclick="closeDC()">Mark DC Closed</button>

<div id="msg" class="msg"></div>

</div>
</div>
