<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Delivery Challan (DC)</title>

<style>

body{
  margin:0;
  font-family: "Segoe UI", Arial, sans-serif;
  background:#eef1f4;
}
.wrapper{
  width:100%;
  max-width:920px;
  margin:40px auto;
  padding:0 20px;
}

.card{
  background:white;
  padding:28px;
  border-radius:6px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h2{
  margin:0 0 24px 0;
  font-size:22px;
  font-weight:600;
  color:#222;
}

.section{
  margin-bottom:22px;
  padding-bottom:14px;
  border-bottom:1px solid #e3e6ea;
}

.section:last-child{
  border-bottom:none;
}

.section-title{
  font-size:13px;
  font-weight:600;
  color:#6b7280;
  margin-bottom:12px;
  text-transform:uppercase;
  letter-spacing:.5px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
  gap:18px 16px;
}

.full{
  grid-column:1 / -1;
}

label{
  font-size:13px;
  font-weight:600;
  color:#444;
  margin-bottom:4px;
  display:block;
}

input, select, textarea{
  width:100%;
  padding:12px 12px;
  border:1px solid #cfd6dd;
  border-radius:4px;
  font-size:14px;
  background:#fafbfc;
}

input:focus, select:focus, textarea:focus{
  outline:none;
  border-color:#2563eb;
  background:white;
}

textarea{
  height:90px;
  resize:none;
}

button{
  background:#0f172a;
  color:white;
  border:none;
  padding:14px;
  border-radius:4px;
  cursor:pointer;
  width:100%;
  font-size:15px;
  font-weight:600;
  letter-spacing:.3px;
}

  button:hover{
  background:#020617;
}

button:disabled{
  background:#9ca3af;
}

.msg{
  margin-top:14px;
  font-weight:600;
  font-size:14px;
}

.success{ color:#15803d; }
.error{ color:#dc2626; }
.fetch{ color:#475569; }

</style>
</head>

<body>

<div class="wrapper">

<div class="card">

<h2>Delivery Challan</h2>

<div class="section">
<div class="section-title">Operator Info</div>
<div class="grid">
<div>
<label>Operator</label>
<input id="operator">
</div>

<div>
<label>Customer</label>
<select id="customer"></select>
</div>
</div>
</div>

<div class="section">
<div class="section-title">Dispatch Details</div>
<div class="grid">
<div>
<label>Vehicle No</label>
<input id="vehicle">
</div>

<div>
<label>Driver Name</label>
<input id="driver">
</div>
</div>
</div>

<div class="section">
<div class="section-title">Material</div>
<div class="grid">
<div>
<label>Part ID</label>
<input id="part">
</div>

<div>
<label>Qty</label>
<input type="number" id="qty">
</div>

<div class="full">
<label>Description</label>
<input id="desc" readonly>
</div>
</div>
</div>

<div class="section">
<div class="section-title">Remarks</div>
<textarea id="remarks"></textarea>
</div>

<button id="saveBtn" onclick="save()">SAVE & DOWNLOAD DC</button>

<div id="msg" class="msg"></div>

</div>
</div>

  <script>

let saving = false;
let partData = null;

function validateForm(){

  if(!operator.value.trim()){
    showError("Enter operator name");
    return false;
  }

  if(!customer.value){
    showError("Select customer");
    return false;
  }

  const v = vehicle.value.trim().toUpperCase();

  const vehicleRegex = /^[A-Z]{2}[- ]?\d{2}[- ]?[A-Z]{1,2}[- ]?\d{4}$/;

  if(!v){
    showError("Enter vehicle number");
    return false;
  }

  if(!vehicleRegex.test(v)){
    showError("Invalid vehicle format");
    return false;
  }

  if(!part.value.trim()){
    showError("Enter part ID");
    return false;
  }

  if(!partData){
    showError("Invalid or unknown part");
    return false;
  }

  if(!qty.value || Number(qty.value) <= 0){
    showError("Enter valid quantity");
    return false;
  }

  if(!desc.value.trim()){
    showError("Part description missing");
    return false;
  }

  if(!remarks.value.trim()){
    showError("Enter remarks");
    return false;
  }

  vehicle.value = v;

  return true;
}

function showError(text){
  msg.innerText = text;
  msg.className = "msg error";
}

/* ===== LOAD CUSTOMER ===== */

    google.script.run.withSuccessHandler(list=>{
  list.forEach(r=>{
    customer.innerHTML += `<option value="${r[0]}">${r[1]}</option>`;
  });
}).getCustomers();

/* ===== FETCH PART ===== */

    part.onblur = function(){
  const code = part.value.trim();
  if(!code) return;

  msg.innerText="Fetching part...";
  msg.className="msg fetch";

  google.script.run.withSuccessHandler(res=>{
    if(res){
      desc.value = res.desc;
      partData = res;
      msg.innerText="";
    }else{
      desc.value="";
      msg.innerText="Part not found";
      msg.className="msg error";
    }
  }).getPart(code);
}

    /* ===== SAVE ===== */

function save(){

if(saving) return;

if(!validateForm()){
  return;
}

saving = true;
saveBtn.disabled = true;
msg.innerText="Generating DC...";
msg.className="msg fetch";

google.script.run
.withSuccessHandler(res=>{

  let a=document.createElement("a");
  a.href="data:application/pdf;base64,"+res.base64;
  a.download=`DC_${res.dc}.pdf`;
  a.click();

  msg.innerText="Saved successfully";
  msg.className="msg success";

  operator.value="";
  vehicle.value="";
  driver.value="";
  part.value="";
  qty.value="";
  desc.value="";
  remarks.value="";

  partData=null;

  // reset dropdown to first option
  customer.selectedIndex=0;

  // focus first field
  operator.focus();

  saving=false;
  saveBtn.disabled=false;

})
.withFailureHandler(err=>{
  msg.innerText=err.message;
  msg.className="msg error";
  saving=false;
  saveBtn.disabled=false;
})
.saveDC({
  operator:operator.value,
  customer_id:customer.value,
  customer_name:customer.options[customer.selectedIndex].text,
  vehicle:vehicle.value,
  driver:driver.value,
  part:part.value,
  desc:desc.value,
  qty:qty.value,
  uom:partData.uom,
  remarks:remarks.value,
  machine:localStorage.getItem("machine") || "DISPATCH_PC"
});

}

</script>

</body>
</html>
